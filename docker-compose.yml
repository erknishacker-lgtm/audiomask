services:
  audioshield:
    build: .
    container_name: audioshield
    ports:
      - "8501:8501"
    volumes:
      # Persistência de saídas e relatórios no host
      - ./output:/app/output
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
